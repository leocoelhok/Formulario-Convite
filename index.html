<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de convite</title>
    <link href="https://fonts.googleapis.com/css2?family=Leckerli+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <div id="app">

        <aside>
            <div class="aside-container">
                <div class="title-area">
                    <img src="assets/title-area/Logo.svg" alt="">
                    <img src="assets/title-area/Festivite.svg" alt="">
                    <p>Crie um convite digital para o seu evento</p>
                </div>
            </div>
        </aside>

        <main>
            <div class="title">
                <p>Crie seu convite</p>
            </div>

            <div class="event-area">
                <img src="assets/icons/calendar.svg" alt="">
                <p>Sobre o evento</p>
            </div>

            <form action="" method="post" enctype="multipart/form-data">
                <div class="input-wrapper">
                    <label for="event-title">Título</label>
                    <input type="text" id="event-title" placeholder="Nome do evento">
                 </div>
            </form>
        </main>

        
    </div>
</body>
</html>
